services:
  eric-db:
    image: postgres:latest
    container_name: eric-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgres/data
  eric-api:
    build:
      context: .
      target: builder
      args:
        MIX_ENV: dev
    container_name: eric-api
    network_mode: host
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PORT=4000
    depends_on:
      - eric-db
volumes:
  deps:
  build:
  db:
